name: Libcedar CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build, Test, and Package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-c
      run: cargo install cargo-c --locked --version 0.10.19+cargo-0.93.0

    - name: Cache cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Build Library (Debug)
      run: cargo build

    - name: Run Rust tests
      run: cargo test

    - name: Build installable C package
      run: |
        cargo cbuild --release
        rm -rf "$RUNNER_TEMP/libcedar-stage"
        mkdir -p "$RUNNER_TEMP/libcedar-stage"
        cargo cinstall --release --prefix=/opt/libcedar --destdir="$RUNNER_TEMP/libcedar-stage"

    - name: Discover staged libcedar paths
      run: |
        prefix="$RUNNER_TEMP/libcedar-stage/opt/libcedar"
        for candidate in "$prefix/lib/pkgconfig" "$prefix"/lib/*/pkgconfig; do
          if [ -f "$candidate/libcedar.pc" ]; then
            echo "LIBCEDAR_PKGCONFIG_DIR=$candidate" >> "$GITHUB_ENV"
            echo "LIBCEDAR_LIB_DIR=$(dirname "$candidate")" >> "$GITHUB_ENV"
            exit 0
          fi
        done
        echo "Unable to locate staged libcedar.pc under $prefix" >&2
        exit 1

    - name: Verify staged package layout
      run: |
        ls -R "$RUNNER_TEMP/libcedar-stage"
        test -f "$RUNNER_TEMP/libcedar-stage/opt/libcedar/include/libcedar.h"
        test -f "$LIBCEDAR_PKGCONFIG_DIR/libcedar.pc"

    - name: Run C integration tests against installed package
      run: |
        export PKG_CONFIG_SYSROOT_DIR="$RUNNER_TEMP/libcedar-stage"
        export PKG_CONFIG_PATH="$LIBCEDAR_PKGCONFIG_DIR"
        cc -o tests/test_libcedar tests/test_libcedar.c $(pkg-config --cflags --libs libcedar)
        LD_LIBRARY_PATH="$LIBCEDAR_LIB_DIR" ./tests/test_libcedar
