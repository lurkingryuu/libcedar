# cbindgen configuration for libcedar
# Generates C-compatible headers from Rust FFI functions

language = "C"

# Header configuration
header = """
/*
 * libcedar.h — C bindings for the Cedar policy engine
 *
 * This header is auto-generated by cbindgen. Do not edit manually.
 *
 * Usage:
 *   #include "libcedar.h"
 *   CedarEngine *engine = cedar_engine_new();
 *   cedar_engine_set_policies(engine, "permit(...);");
 *   CedarDecision d = cedar_engine_is_authorized(engine, ...);
 *   cedar_engine_free(engine);
 */
"""
include_guard = "LIBCEDAR_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true
braces = "SameLine"
tab_width = 4
documentation = true
documentation_style = "c99"
documentation_length = "full"
style = "both"

[export]
include = ["CedarDecision"]

[enum]
rename_variants = "None"

[fn]
# Prefix for all generated functions (none needed, they already have cedar_ prefix)
sort_by = "None"
